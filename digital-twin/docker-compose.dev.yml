# Desenvolvimento: só base de dados + API (frontend com `npm run dev` na máquina)
services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    build:
      context: ../api-geospatial
      dockerfile: Dockerfile
    volumes:
      - ../api-geospatial/app:/app/app
      - upload_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  upload_data:
