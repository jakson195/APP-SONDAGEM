services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: dt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../api-geospatial
      dockerfile: Dockerfile
    container_name: dt-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-500}
      LAS_MAX_UPLOAD_MB: ${LAS_MAX_UPLOAD_MB:-2048}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../api-geospatial/app:/app/app
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_CESIUM_ION_TOKEN: ${VITE_CESIUM_ION_TOKEN}
    container_name: dt-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  upload_data:
