services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: hidro
      POSTGRES_PASSWORD: hidro
      POSTGRES_DB: hidroalerta
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hidro -d hidroalerta"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../backend
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: http://localhost:5174,http://localhost:5173
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      USE_DATABASE: "false"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ../backend
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.ingestion.celery_app.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: ../backend
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.ingestion.celery_app.celery_app beat --loglevel=info

volumes:
  pgdata:
