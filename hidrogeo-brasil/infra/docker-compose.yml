# HidroGeo Brasil — infra Docker

services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: hidrogeo
      POSTGRES_PASSWORD: hidrogeo
      POSTGRES_DB: hidrogeo
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../data/scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hidrogeo -d hidrogeo"]
      interval: 5s
      timeout: 5s
      retries: 10

  pg_tileserv:
    image: pramsey/pg_tileserv:latest
    environment:
      DATABASE_URL: postgresql://hidrogeo:hidrogeo@postgis:5432/hidrogeo
    ports:
      - "7800:7800"
    depends_on:
      postgis:
        condition: service_healthy

  api:
    build:
      context: ../backend
    ports:
      - "8010:8010"
    environment:
      DATABASE_URL: postgresql+asyncpg://hidrogeo:hidrogeo@postgis:5432/hidrogeo
      DATABASE_URL_SYNC: postgresql://hidrogeo:hidrogeo@postgis:5432/hidrogeo
      TILESERV_URL: http://pg_tileserv:7800
      CORS_ORIGINS: http://localhost:5175,http://localhost:5173,http://localhost:3000
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    env_file:
      - ../backend/.env
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery_worker:
    build:
      context: ../backend
    environment:
      DATABASE_URL_SYNC: postgresql://hidrogeo:hidrogeo@postgis:5432/hidrogeo
      REDIS_URL: redis://redis:6379/0
      ANM_TLS_VERIFY: "false"
    env_file:
      - ../backend/.env
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker -l info -Q mining

  celery_beat:
    build:
      context: ../backend
    environment:
      DATABASE_URL_SYNC: postgresql://hidrogeo:hidrogeo@postgis:5432/hidrogeo
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ../backend/.env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.celery_app beat -l info

  nginx:
    image: nginx:alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - pg_tileserv

volumes:
  pgdata:
