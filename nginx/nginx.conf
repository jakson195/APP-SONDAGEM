# Gateway único — comunicação entre módulos
#   /              → app-web (Next.js)
#   /api/*         → api-core (Next.js API routes), exceto /api/geo/
#   /api/geo/*     → api-geospatial (FastAPI /api/v1/)
#   /twin/*        → digital-twin viewer (Cesium)

upstream app_web {
    server app-web:3000;
}

upstream api_core {
    server api-core:3001;
}

upstream api_geospatial {
    server api-geospatial:8000;
}

upstream digital_twin_viewer {
    server digital-twin-viewer:80;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 2048m;

    # API geoespacial (FastAPI) — frontend usa VITE_API_URL + /api/v1/...
    location /api/geo/api/v1/ {
        proxy_pass http://api_geospatial/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    # Viewer Digital Twin (SPA)
    location /twin/ {
        proxy_pass http://digital_twin_viewer/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API core (obras, sondagem, auth, …)
    location /api/ {
        proxy_pass http://api_core;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Aplicação web SOILSUL
    location / {
        proxy_pass http://app_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
