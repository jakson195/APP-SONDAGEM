# fly launch --name datageo-geophysics --region gru
# fly deploy --config fly.toml

app = "datageo-geophysics"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8092"

[http_service]
  internal_port = 8092
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/geophysics/health"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
